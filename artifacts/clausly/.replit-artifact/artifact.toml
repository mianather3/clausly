kind = "web"
previewPath = "/"
title = "Clausly"
version = "1.0.0"
id = "artifacts/clausly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24974

[services.development]
run = "pnpm --filter @workspace/clausly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clausly", "run", "build" ]
publicDir = "artifacts/clausly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24974"
BASE_PATH = "/"
